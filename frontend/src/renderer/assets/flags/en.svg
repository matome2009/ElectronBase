<svg xmlns="http://www.w3.org/2000/svg" width="48" height="32" viewBox="0 0 48 32">
  <!-- Simplified US flag for icon use: 13 stripes, blue canton with star placeholders -->
  <rect width="48" height="32" fill="#b22234"/>
  <!-- white stripes (6 white stripes over red background makes 13 total) -->
  <g fill="#fff">
    <rect y="0" width="48" height="2.4615"/>
    <rect y="4.923" width="48" height="2.4615"/>
    <rect y="9.846" width="48" height="2.4615"/>
    <rect y="14.769" width="48" height="2.4615"/>
    <rect y="19.692" width="48" height="2.4615"/>
    <rect y="24.615" width="48" height="2.4615"/>
  </g>
  <!-- blue canton -->
  <rect width="20" height="13.846" fill="#3c3b6e"/>
  <!-- simplified star grid: small white circles as star placeholders -->
  <g fill="#fff" transform="translate(2,1.5)">
    <!-- 6 columns x 5 rows grid approximated -->
    <g>
      <circle cx="1" cy="1" r="0.7" />
      <circle cx="4" cy="1" r="0.7" />
      <circle cx="7" cy="1" r="0.7" />
      <circle cx="10" cy="1" r="0.7" />
      <circle cx="13" cy="1" r="0.7" />
      <circle cx="16" cy="1" r="0.7" />
    </g>
    <g transform="translate(0,2.6)">
      <circle cx="2.5" cy="1" r="0.7" />
      <circle cx="5.5" cy="1" r="0.7" />
      <circle cx="8.5" cy="1" r="0.7" />
      <circle cx="11.5" cy="1" r="0.7" />
      <circle cx="14.5" cy="1" r="0.7" />
    </g>
    <g transform="translate(0,5.2)">
      <circle cx="1" cy="1" r="0.7" />
      <circle cx="4" cy="1" r="0.7" />
      <circle cx="7" cy="1" r="0.7" />
      <circle cx="10" cy="1" r="0.7" />
      <circle cx="13" cy="1" r="0.7" />
      <circle cx="16" cy="1" r="0.7" />
    </g>
    <g transform="translate(0,7.8)">
      <circle cx="2.5" cy="1" r="0.7" />
      <circle cx="5.5" cy="1" r="0.7" />
      <circle cx="8.5" cy="1" r="0.7" />
      <circle cx="11.5" cy="1" r="0.7" />
      <circle cx="14.5" cy="1" r="0.7" />
    </g>
    <g transform="translate(0,10.4)">
      <circle cx="1" cy="1" r="0.7" />
      <circle cx="4" cy="1" r="0.7" />
      <circle cx="7" cy="1" r="0.7" />
      <circle cx="10" cy="1" r="0.7" />
      <circle cx="13" cy="1" r="0.7" />
      <circle cx="16" cy="1" r="0.7" />
    </g>
  </g>
</svg>